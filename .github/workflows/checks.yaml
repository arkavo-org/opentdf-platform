name: "Checks"

env:
  IS_RELEASE_BRANCH: ${{ startsWith(github.head_ref, 'release-please-') }}

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
      - release/**
  merge_group:
    branches:
      - main
    types:
      - checks_requested
  schedule:
    - cron: '25 5 * * *' # 5:25am UTC = 12:25am EST / 8:25am EEST
  workflow_call:
  workflow_dispatch:
    inputs:
      testrail-run-name-for-cli-test:
        description: 'Name for the TestRail test run'
        required: false
        default: ''

permissions: {}

jobs:
  go:
    runs-on: ubuntu-22.04
    permissions:
      checks: write
      contents: read
      pull-requests: read
    strategy:
      matrix:
        directory:
          - examples
          - otdfctl
          - sdk
          - service
          - lib/ocrypto
          - lib/fixtures
          - lib/flattening
          - lib/identifier
          - tests-bdd
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: ${{ matrix.directory }}/go.mod
          check-latest: false
          cache-dependency-path: |
            examples/go.sum
            otdfctl/go.sum
            protocol/go/go.sum
            sdk/go.sum
            service/go.sum
            tests-bdd/go.sum
      - if: env.IS_RELEASE_BRANCH == 'true'
        name: prevent depending on unreleased upstream changes
        run: ./.github/scripts/work-init.sh
      - if: startsWith(github.head_ref, 'release-please--branches--')
        name: prevent tagging with replace directives
        run: go mod edit --json | jq -e '.Replace | not'
        working-directory: ${{ matrix.directory }}
      - run: go mod download
        working-directory: ${{ matrix.directory }}
      - run: go mod verify
        working-directory: ${{ matrix.directory }}
      - run: go work use .
        if: env.IS_RELEASE_BRANCH == 'true'
        working-directory: ${{ matrix.directory }}
      - name: govulncheck
        id: govulncheck
        continue-on-error: true
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: "1.25.9"
          work-dir: ${{ matrix.directory }}
      - if: steps.govulncheck.outcome == 'failure'
        run: echo "$MODULE_DIR" > "/tmp/govulncheck-failure-${JOB_INDEX}.txt"
        env:
          MODULE_DIR: ${{ matrix.directory }}
          JOB_INDEX: ${{ strategy.job-index }}
      - if: steps.govulncheck.outcome == 'failure'
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: govulncheck-failure-${{ strategy.job-index }}
          path: /tmp/govulncheck-failure-${{ strategy.job-index }}.txt
          retention-days: 1
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.8.0
          working-directory: ${{ matrix.directory }}
          skip-cache: true
          only-new-issues: true
      - if: matrix.directory == 'service'
        run: .github/scripts/init-temp-keys.sh
      - run: go test ./... -short
        working-directory: ${{ matrix.directory }}
      - name: check go fmt and go mod tidy
        run: |-
          go mod tidy
          go fmt ./...
          git restore go.sum
        working-directory: ${{ matrix.directory }}
      - run: git diff
      - run: git diff-files --ignore-submodules
      - name: Check that files have been formatted before PR submission; see above for error details
        run: git diff-files --quiet --ignore-submodules
        if: env.IS_RELEASE_BRANCH == 'false'

  changes:
    permissions:
      contents: read
    runs-on: ubuntu-22.04
    outputs:
      proto: ${{ steps.check.outputs.proto }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Check for proto file changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            if git diff --name-only "$BASE_SHA" HEAD | grep -qE '\.proto$|^Makefile$|^buf\.|^protocol/codegen/|^protocol/go/internal/|^sdk/codegen/'; then
              echo "proto=true" >> "$GITHUB_OUTPUT"
            else
              echo "proto=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # For non-PR events (push, merge_group), always run
            echo "proto=true" >> "$GITHUB_OUTPUT"
          fi

  image:
    permissions:
      contents: read
    name: image build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          cache-binary: false
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: false

  buflint:
    needs: changes
    if: needs.changes.outputs.proto == 'true' || github.event_name != 'pull_request'
    permissions:
      contents: read
    name: Protocol Buffer Lint and Gencode Up-to-date check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ github.token }}
          version: "1.68.2"
      - uses: bufbuild/buf-lint-action@06f9dd823d873146471cfaaf108a993fe00e5325 # v1.1.1
        with:
          input: service
      - uses: bufbuild/buf-breaking-action@c57b3d842a5c3f3b454756ef65305a50a587c5ba # v1.1.4
        with:
          input: service
          against: "https://github.com/opentdf/platform.git#branch=${{ github.event.pull_request.base.ref || github.base_ref || 'main' }},subdir=service"
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: "service/go.mod"
          check-latest: false
          cache-dependency-path: |
            service/go.sum
            protocol/go/go.sum
            sdk/go.sum
            examples/go.sum
      - run: cd service && go get github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc
      - run: cd service && go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc
      - run: cd service && go install github.com/sudorandom/protoc-gen-connect-openapi@v0.18.0
      - run: cd service && go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
      - run: make proto-generate
      - name: generate connect wrappers
        run: make connect-wrapper-generate
      # Ensure all generated files are staged before checking for diffs
      - run: git add docs/openapi/* docs/grpc/* || true
      - name: Restore go.mod after installing protoc-gen-doc
        run: git restore {service,protocol/go}/go.{mod,sum}
      - name: validate go mod tidy
        run: |-
          cd protocol/go
          go mod tidy
          git restore go.sum
      - run: git diff
      - run: git diff-files --ignore-submodules
      - name: Check that make proto-generate and connect-wrapper-generate have run before PR submission; see above for error details
        run: git diff-files --quiet --ignore-submodules

  ci:
    permissions: {}
    needs:
      - buflint
      - go
      - image
      - license
    runs-on: ubuntu-22.04
    if: ${{ !cancelled() }}
    steps:
      - if: contains(needs.*.result, 'failure')
        name: Check for failed jobs
        run: echo "One or more jobs failed. Please look at the failed jobs for details." && exit 1

  license:
    permissions:
      contents: read
    name: license check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: "service/go.mod"
          check-latest: false
          cache: false
      - name: check service licenses
        run: >
          "$(go env GOROOT)"/bin/go run github.com/google/go-licenses@5348b744d0983d85713295ea08a20cca1654a45e
          check --disallowed_types=forbidden --include_tests
          ./service
      - name: check sdk licenses
        run: >
          "$(go env GOROOT)"/bin/go run github.com/google/go-licenses@5348b744d0983d85713295ea08a20cca1654a45e
          check --disallowed_types=forbidden --include_tests
          ./sdk
      - name: check examples licenses
        run: >
          "$(go env GOROOT)"/bin/go run github.com/google/go-licenses@5348b744d0983d85713295ea08a20cca1654a45e
          check --disallowed_types=forbidden --include_tests
          ./examples
