# Sample read-only policy snapshot for the authorization service.
#
# Reference this file from opentdf.yaml as:
#
#   services:
#     authorization:
#       policy_file: ./examples/config/policy.example.yaml
#
# Run the platform without the policy CRUD service to skip Postgres entirely:
#
#   mode: core,-policy
#
# Author this file by hand or export it from the policy CRUD admin server
# (where otdfctl writes). The runtime treats it as immutable; restart the
# process to pick up changes.

namespaces:
  - name: example.com

key_access_servers:
  - id: kas-default
    uri: https://kas.example.com

attributes:
  - namespace: example.com
    name: classification
    rule: hierarchy
    grants:
      - id: kas-default
    values:
      - value: topsecret
      - value: secret
      - value: confidential
      - value: public

  - namespace: example.com
    name: department
    rule: anyOf
    values:
      - value: engineering
      - value: sales
      - value: legal

subject_mappings:
  - attribute_value_fqn: https://example.com/attr/classification/value/topsecret
    inline_condition_set:
      subject_sets:
        - condition_groups:
            - boolean_operator: AND
              conditions:
                - subject_external_selector_value: .realm_access.roles
                  operator: IN
                  subject_external_values:
                    - topsecret-cleared
    actions:
      - name: read
        standard: TRANSMIT

  - attribute_value_fqn: https://example.com/attr/department/value/engineering
    inline_condition_set:
      subject_sets:
        - condition_groups:
            - boolean_operator: AND
              conditions:
                - subject_external_selector_value: .department
                  operator: IN
                  subject_external_values:
                    - engineering
    actions:
      - name: read
        standard: TRANSMIT
